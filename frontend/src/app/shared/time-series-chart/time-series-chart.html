<div class="chart-card">
  <div class="chart-header">
    <span class="chart-title">{{ title() }}</span>
    @if (unit()) {
      <span class="chart-unit">{{ unit() }}</span>
    }
  </div>

  @if (points().length > 0) {
    <svg [attr.viewBox]="'0 0 ' + width + ' ' + height" preserveAspectRatio="none" class="chart-svg">
      <line class="baseline" x1="0" [attr.y1]="baselineY" [attr.x2]="width" [attr.y2]="baselineY" />

      <path class="area" [attr.d]="areaPath()" />
      <path class="line" [attr.d]="linePath()" />

      @for (p of points(); track $index) {
        <circle class="hit-point" [attr.cx]="p.x" [attr.cy]="p.y" r="6">
          <title>{{ p.timestamp | date: 'short' }}: {{ p.value | number: '1.0-2' }}</title>
        </circle>
      }

      @if (latest(); as l) {
        <circle class="end-dot" [attr.cx]="l.x" [attr.cy]="l.y" r="4" />
      }
    </svg>

    <div class="chart-range">
      <span>Min {{ minValue() | number: '1.0-2' }}</span>
      <span>Max {{ maxValue() | number: '1.0-2' }}</span>
      @if (latest(); as l) {
        <span class="latest">Latest {{ l.value | number: '1.0-2' }}</span>
      }
    </div>
  } @else {
    <p class="no-data">No readings yet.</p>
  }
</div>
